# Deploy do backend no Render (free tier). O frontend vai na Vercel.
services:
  - type: web
    name: ekaizen-5s-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DB_PATH
        value: /tmp/ekaizen5s.db
      - key: CORS_ORIGINS
        value: https://jogo-didatico-5-s.vercel.app
